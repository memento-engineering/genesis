name: genesis_console
description: >-
  An offline terminal driver for the genesis stack: render an A2UI v0.9 surface
  to a character grid and enforce client actions against the live tree.
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  genesis_consent: ^0.1.0
  genesis_dialogue: ^0.1.0
  genesis_taxonomy: ^0.1.0
  genesis_tree: ^0.1.0
  genesis_typesetting: ^0.1.0

dev_dependencies:
  build_runner: ^2.15.0
  lints: ^5.1.0
  test: ^1.25.0
