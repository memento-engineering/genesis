name: genesis_tmux
description: >-
  A zero-dependency, injection-safe tmux client for supervising long-lived
  panes: one-shot acts plus a poll-backed or control-mode-backed observation
  stream, behind a single fakeable executor seam.
version: 0.1.0
repository: https://github.com/memento-engineering/genesis
resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  meta: ^1.15.0

dev_dependencies:
  lints: ^5.1.0
  test: ^1.25.0
