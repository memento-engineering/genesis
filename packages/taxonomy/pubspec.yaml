name: genesis_taxonomy
description: >-
  Schema-first node vocabulary: one catalog classifies the node species; codegen
  emits the Dart factory registry and the LLM tool schema (ADR-0002).
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  build: ^4.0.6
  dart_style: ^3.1.9
  genesis_tree: any
  meta: ^1.15.0

dev_dependencies:
  build_runner: ^2.15.0
  json_schema: ^5.2.2
  lints: ^5.1.0
  test: ^1.25.0
