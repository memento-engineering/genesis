name: genesis_typesetting
description: >-
  A bare-VM terminal render backend: a double-buffered character grid painted to
  minimal ANSI from a genesis_tree's drained dirty set.
version: 0.1.1
repository: https://github.com/memento-engineering/genesis
resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  genesis_tree: ^0.1.0
  meta: ^1.15.0

dev_dependencies:
  genesis_perception: ^0.1.0
  lints: ^5.1.0
  test: ^1.25.0
